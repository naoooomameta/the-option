<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ページが見つかりません — the option</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#06080f">
  <link rel="icon" type="image/svg+xml" href="/the-option/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root{
      --bg-0:#06080f; --bg-2:#11162a; --line-strong:#2a364f;
      --fg-0:#f3f6fb; --fg-1:#d6dde9; --fg-2:#a6b1c4;
      --up:#00e08a; --gold:#f5c542;
      --font-ui:"Noto Sans JP","Manrope",-apple-system,BlinkMacSystemFont,sans-serif;
      --font-display:"Manrope","Noto Sans JP",sans-serif;
      --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:var(--font-ui); color:var(--fg-0); background:var(--bg-0);
      font-size:16px; line-height:1.62; -webkit-font-smoothing:antialiased; padding:24px;
    }
    body::before{
      content:""; position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(45% 35% at 80% 15%, rgba(0,224,138,0.14), transparent 70%),
        radial-gradient(40% 32% at 15% 85%, rgba(94,170,255,0.08), transparent 70%),
        var(--bg-0);
    }
    .box{ max-width:560px; text-align:center; }
    .brand{ display:inline-flex; align-items:center; gap:10px; font-size:18px; font-weight:600; letter-spacing:-0.02em; color:inherit; text-decoration:none; }
    .brand .dot{ width:10px; height:10px; border-radius:50%; background:var(--up); box-shadow:0 0 0 3px rgba(0,224,138,0.15),0 0 14px var(--up); }
    .brand .opt{ color:var(--fg-2); font-weight:400; }
    .code{ font-family:var(--font-display); font-weight:800; font-size:clamp(72px,18vw,120px); line-height:1; letter-spacing:-0.04em; margin:32px 0 8px;
      background:linear-gradient(120deg,var(--up) 10%,var(--gold) 70%,#fff);
      -webkit-background-clip:text; background-clip:text; color:transparent; }
    h1{ font-family:var(--font-display); font-size:clamp(19px,3.4vw,24px); font-weight:700; letter-spacing:-0.01em; margin:0 0 10px; word-break:keep-all; }
    p{ color:var(--fg-2); font-size:14.5px; margin:0 0 28px; }
    .actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .btn-primary{
      display:inline-flex; align-items:center; gap:8px;
      background:var(--up); color:#03110a; font-weight:700; font-size:14.5px;
      padding:12px 20px; border-radius:10px; text-decoration:none;
      box-shadow:0 0 0 1px rgba(0,224,138,0.45),0 14px 32px -10px rgba(0,224,138,0.5);
      transition:transform .12s;
    }
    .btn-primary:hover{ transform:translateY(-1px); }
    .btn-ghost{
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 20px; font-size:14.5px; color:var(--fg-1); text-decoration:none;
      border:1px solid var(--line-strong); border-radius:10px; font-weight:500;
    }
    .btn-ghost:hover{ background:var(--bg-2); color:var(--fg-0); }
    .path{ margin-top:28px; font-family:var(--font-mono); font-size:11.5px; color:var(--fg-2); word-break:break-all; }
  </style>
</head>
<body>
  <main class="box">
    <a class="brand" href="/the-option/">
      <span class="dot"></span>
      <span><span class="opt">the</span><b>option</b></span>
    </a>
    <div class="code">404</div>
    <h1>お探しのページが見つかりません</h1>
    <p>URLが変更されたか、ページが存在しない可能性があります。<br>以下のリンクからお進みください。</p>
    <div class="actions">
      <a class="btn-primary" href="/the-option/">ホームへ戻る</a>
      <a class="btn-ghost" href="/the-option/campaign/cashback.html">¥5,000キャンペーン</a>
      <a class="btn-ghost" href="/the-option/the-option.html">デモを試す</a>
    </div>
    <p class="path" id="path"></p>
  </main>
  <script>
    document.getElementById('path').textContent = location.pathname;
  </script>
</body>
</html>
